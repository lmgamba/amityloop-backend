spring.application.name=amityloop

# Active profile ? Spring loads application-{profile}.properties on top of this file.
# Options: local | dev | staging | prod
# In production (Railway/Render), set this as an environment variable, not here.
spring.profiles.active=local

# --- DATABASE ---

# JDBC connection URL. Format: jdbc:postgresql://{host}:{port}/{database}
# localhost + 5432 is the PostgreSQL default. Changes in production to your cloud DB URL.
spring.datasource.url=jdbc:postgresql://localhost:5432/amityloop

# PostgreSQL username. ${DB_PASSWORD} reads from application-local.properties or env variable.
# Never hardcode credentials here, this file goes to GitHub.
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# --- JPA / HIBERNATE ---

# Controls how Hibernate manages the database schema on startup.
# update  ? adds new columns/tables but never deletes anything. Safe for development.
# create  ? drops and recreates all tables on every startup. Useful early dev, destroys data.
# validate ? checks schema matches entities, fails if not. Good for staging/prod.
# none    ? does nothing. Use in production ? schema changes go through migrations (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Prints every SQL query Hibernate executes to the console.
# true in development to understand what queries the code generates.
# Always false in production, due to performance cost and noisy logs.
spring.jpa.show-sql=true

# Keeps the database connection open during view rendering (leftover from JSP era).
# false is correct for REST APIs ? you never render views, so this is unnecessary and wastes connections.
# Should always be false in any modern REST project.
spring.jpa.open-in-view=false

# --- JWT ---

# Secret key used to sign and verify JWT tokens. ${JWT_SECRET} reads from local/env.
# In production this must be a long random string (256+ bits), never a readable word.
jwt.secret=${JWT_SECRET}

# Token expiration in milliseconds. 86400000 = 24 hours.
# Shorter = more secure but worse UX. Longer = more comfortable but higher risk if token is stolen.
# Common values: 3600000 (1h) for sensitive apps, 86400000 (24h) for standard apps.
jwt.expiration=86400000